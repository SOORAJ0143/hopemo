services:
  - type: web
    name: hopemo
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_MODEL
        value: gpt-4-turbo-preview
      - key: CHROMA_PERSIST_DIR
        value: /data/chromadb
      - key: PYTHONPATH
        value: /app
      - key: DATABASE_URL
        fromDatabase:
          name: hopemo-db
          property: connectionString
    disk:
      - name: chroma-data
        mountPath: /data
        sizeGB: 1