services:
  - type: web
    name: hopemo
    runtime: docker
    repo: https://github.com/SOORAJ0143/hopemo   # your repo URL
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_MODEL
        value: gpt-4-turbo-preview
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chromadb
      - key: PYTHONPATH
        value: /app
      - key: DATABASE_URL
        fromDatabase:
          name: hopemo-db
          property: connectionString