services:
  # Web API service
  - type: web
    name: hopemo
    runtime: python
    plan: free                         # Use 'starter' or 'professional' for production
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false                    # You'll set this manually in the dashboard
      - key: HF_TOKEN
        sync: false                    # Optional but recommended
      - key: SECRET_KEY
        generateValue: true            # Render will generate a random secret
      - key: ENVIRONMENT
        value: production
      - key: OPENAI_MODEL
        value: gpt-4-turbo-preview
      - key: CHROMA_PERSIST_DIR
        value: /data/chromadb
      - key: PYTHONPATH
        value: /app
      - key: DATABASE_URL               # PostgreSQL connection string
        fromDatabase:
          name: hopemo-db              # Must match the database name you create
          property: connectionString
    disk:
      - name: chroma-data
        mountPath: /data
        sizeGB: 1                      # Adjust if you have many PDFs

