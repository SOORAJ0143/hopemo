services:
  - type: web
    name: hopemo-backend
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: hopemo-db
          property: connectionString
      - key: CHROMA_PERSIST_DIR
        value: /opt/render/project/src/data/chromadb
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.10.13
    disk:
      - name: chromadb-data
        mountPath: /opt/render/project/src/data
        sizeGB: 5